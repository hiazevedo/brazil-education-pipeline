# Main orchestration job for the Brazil Education Pipeline.
# Runs the full Bronze → Silver → Gold → ML sequence.
# Uses serverless compute (required by this workspace).

resources:
  jobs:
    education_pipeline:
      name: brazil-education-pipeline

      # Triggered manually or via GitHub Actions (Jobs API)
      # No automatic schedule — data arrives irregularly from INEP

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}

      tasks:
        # ── Bronze ────────────────────────────────────────────────────────────
        - task_key: bronze_enem
          notebook_task:
            notebook_path: ../src/notebooks/bronze/01_enem.py
          environment_key: default

        - task_key: bronze_censo
          notebook_task:
            notebook_path: ../src/notebooks/bronze/02_censo_escolar.py
          environment_key: default

        - task_key: bronze_ideb
          notebook_task:
            notebook_path: ../src/notebooks/bronze/03_ideb.py
          environment_key: default

        # ── Silver ────────────────────────────────────────────────────────────
        - task_key: silver_enem
          depends_on:
            - task_key: bronze_enem
          notebook_task:
            notebook_path: ../src/notebooks/silver/04_enem.py
          environment_key: default

        - task_key: silver_censo_ideb
          depends_on:
            - task_key: bronze_censo
            - task_key: bronze_ideb
          notebook_task:
            notebook_path: ../src/notebooks/silver/05_censo_ideb.py
          environment_key: default

        # ── Gold ──────────────────────────────────────────────────────────────
        - task_key: gold_analytics
          depends_on:
            - task_key: silver_enem
            - task_key: silver_censo_ideb
          notebook_task:
            notebook_path: ../src/notebooks/gold/06_analytics.py
          environment_key: default

        # ── ML ────────────────────────────────────────────────────────────────
        - task_key: ml_feature_engineering
          depends_on:
            - task_key: silver_enem
            - task_key: silver_censo_ideb
          notebook_task:
            notebook_path: ../src/notebooks/ml/07_feature_engineering.py
          environment_key: default

        - task_key: ml_training
          depends_on:
            - task_key: ml_feature_engineering
          notebook_task:
            notebook_path: ../src/notebooks/ml/08_training.py
          environment_key: default

        - task_key: ml_clustering
          depends_on:
            - task_key: gold_analytics
          notebook_task:
            notebook_path: ../src/notebooks/ml/08b_clustering.py
          environment_key: default

        - task_key: ml_inference
          depends_on:
            - task_key: ml_training
            - task_key: gold_analytics
          notebook_task:
            notebook_path: ../src/notebooks/ml/09_inference.py
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - --editable ${workspace.file_path}
