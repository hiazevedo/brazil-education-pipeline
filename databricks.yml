# Databricks Asset Bundle — Brazil Education Pipeline
# Docs: https://docs.databricks.com/dev-tools/bundles/index.html
bundle:
  name: brazil_education_pipeline
  uuid: cdde8449-156a-4b2e-b5da-c6a615e0bf9a

include:
  - resources/*.yml

artifacts:
  brazil_edu_whl:
    type: whl
    path: .
    build: "pip install build && python -m build --wheel"

variables:
  catalog:
    description: Unity Catalog catalog name
  schema:
    description: Target schema (dev or prod)

targets:
  dev:
    # Development mode: resources get prefixed with '[dev <username>]'
    # and all schedules/triggers are paused automatically.
    mode: development
    default: true
    workspace:
      host: https://dbc-4755d9a9-d11b.cloud.databricks.com
    variables:
      catalog: education_pipeline
      schema: dev

  prod:
    mode: production
    workspace:
      host: https://dbc-4755d9a9-d11b.cloud.databricks.com
      root_path: /Workspace/Users/higor_com@hotmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: education_pipeline
      schema: prod
    permissions:
      - user_name: higor_com@hotmail.com
        level: CAN_MANAGE
