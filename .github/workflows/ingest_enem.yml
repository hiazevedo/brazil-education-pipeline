name: Ingest ENEM Microdata

on:
  workflow_dispatch:
    inputs:
      years:
        description: "Comma-separated years to ingest (e.g. 2022,2023)"
        required: true
        default: "2023"
  schedule:
    # Runs on March 1st every year — INEP typically releases previous year data in Q1
    - cron: "0 6 1 3 *"

jobs:
  ingest:
    name: Download → Filter → Upload
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      ENEM_YEARS: ${{ github.event.inputs.years || '2023' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ingestion/requirements.txt

      - name: Install dependencies
        run: pip install -r ingestion/requirements.txt

      - name: Run ingestion
        working-directory: ingestion
        run: python enem.py

      - name: Trigger Databricks pipeline job
        if: success()
        run: |
          curl -sf -X POST "$DATABRICKS_HOST/api/2.1/jobs/run-now" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"job_id": ${{ vars.DATABRICKS_PIPELINE_JOB_ID }} }'
